name: Release Artifacts

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Build
        run: bun run build

      - name: Validate
        run: bun run validate

      - name: Test
        run: bun test

      - name: Package release artifacts
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mkdir -p release
          cd dist/plugin && zip -r ../../release/liminal-spec-plugin-v${VERSION}.zip . && cd ../..
          cp dist/standalone/liminal-spec-skill-pack.zip release/liminal-spec-skill-pack-v${VERSION}.zip
          cp dist/standalone/liminal-spec-markdown-pack.zip release/liminal-spec-markdown-pack-v${VERSION}.zip

      - name: Create or update Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release create "$TAG" \
            release/liminal-spec-plugin-*.zip \
            release/liminal-spec-skill-pack-*.zip \
            release/liminal-spec-markdown-pack-*.zip \
            --title "$TAG" \
            --generate-notes \
            2>/dev/null \
          || gh release upload "$TAG" \
            release/liminal-spec-plugin-*.zip \
            release/liminal-spec-skill-pack-*.zip \
            release/liminal-spec-markdown-pack-*.zip \
            --clobber
